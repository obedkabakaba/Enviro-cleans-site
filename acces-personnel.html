<style>
  * { box-sizing: border-box; }
  body{
    font-family:'Open Sans', Arial, sans-serif;
    background:#0f1b2d;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    margin:0;
    padding:20px;
  }
  .box{
    background:#fff;
    border-radius:16px;
    padding:40px 32px;
    max-width:380px;
    width:100%;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,.25);
  }
  h2{
    font-family:'Montserrat', sans-serif;
    font-weight:800;
    font-size:20px;
    margin:0 0 8px;
    color:#0f1b2d;
  }
  p{ color:#777; font-size:13px; margin-bottom:24px; line-height:1.5; }
  input{
    width:100%;
    padding:13px 14px;
    border:1.5px solid #ddd;
    border-radius:8px;
    font-size:16px;
    text-align:center;
    letter-spacing:3px;
    text-transform:uppercase;
    margin-bottom:14px;
  }
  input:focus{ outline:none; border-color:#3ab54a; }
  button{
    width:100%;
    padding:13px;
    background:#3ab54a;
    color:#fff;
    border:none;
    border-radius:8px;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    font-family:'Montserrat', sans-serif;
  }
  button:hover{ background:#2d9a3c; }
  .error{ color:#e53935; font-size:12.5px; margin-top:12px; display:none; }
  #portalList{ display:none; margin-top:8px; text-align:left; }
  #portalList a{
    display:flex;
    align-items:center;
    padding:14px 16px;
    background:#f7f7f7;
    border-radius:10px;
    margin-bottom:10px;
    color:#0f1b2d;
    text-decoration:none;
    font-weight:700;
    font-size:14px;
    font-family:'Montserrat', sans-serif;
    transition:background .2s;
  }
  #portalList a:hover{ background:#eee; }
  #portalList .sub{
    display:block;
    font-family:'Open Sans', sans-serif;
    font-weight:400;
    font-size:11.5px;
    color:#999;
    margin-top:2px;
  }
</style>
</head>
<body>
  <div class="box">
    <h2>Accès personnel</h2>
    <p>Cette section est réservée aux employés Enviro Cleans.</p>

    <div id="gateForm">
      <input type="text" id="codeInput" placeholder="Code d'accès" maxlength="20" autocomplete="off"/>
      <button onclick="checkCode()">Entrer</button>
      <p class="error" id="errorMsg">Code incorrect. Réessayez.</p>
    </div>

    <div id="portalList">
      <a href="gestionnaire.html">🗂️ Espace Gestionnaire<span class="sub">Clients, abonnements, personnel</span></a>
      <a href="superviseur.html">🧭 Espace Superviseur<span class="sub">Tournées et zones</span></a>
      <a href="collecteur.html">🚛 Espace Collecteur<span class="sub">Tournées du jour</span></a>
      <a href="administrateur.html">📊 Espace Administrateur<span class="sub">Vue globale et performances</span></a>
    </div>
  </div>

<script>
function checkCode(){
  const val = document.getElementById('codeInput').value.trim().toUpperCase();
  const errorMsg = document.getElementById('errorMsg');
  if(val === 'MAJOR'){
    document.getElementById('gateForm').style.display = 'none';
    document.getElementById('portalList').style.display = 'block';
  } else {
    errorMsg.style.display = 'block';
  }
}
document.getElementById('codeInput').addEventListener('keypress', function(e){
  if(e.key === 'Enter') checkCode();
});
</script>
</body>
</html>
